<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Keindahan Alam Semesta</title>

<style>
/* Background gradient galaksi */
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(270deg, #020024, #090979, #00d4ff);
  background-size: 600% 600%;
  animation: gradientBG 15s ease infinite;
}

/* Animasi warna */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Bintang */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
}

.stars span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: blink 2s infinite;
}

/* Animasi kedip bintang */
@keyframes blink {
  0%,100% {opacity: 0.2;}
  50% {opacity: 1;}
}

/* Konten utama */
.content {
  position: relative;
  top: 30%;
  transform: translateY(-50%);
}

h1 {
  font-size: 50px;
  text-shadow: 0 0 20px #00d4ff;
}

p {
  font-size: 20px;
  width: 60%;
  margin: auto;
  line-height: 1.6;
}

/* Tombol */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #00d4ff;
  color: black;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 15px #00d4ff;
  transition: 0.3s;
}

button:hover {
  background: white;
}
</style>

</head>
<body>

<!-- Bintang -->
<div class="stars" id="stars"></div>

<!-- Konten -->
<div class="content">
  <h1>🌌 Keindahan Alam Semesta</h1>
  <p>
    Alam semesta penuh dengan keajaiban—dari bintang yang berkilau,
    galaksi yang luas, hingga misteri tak terbatas yang belum terungkap.
    Keindahan ini mengingatkan kita betapa kecilnya kita di tengah luasnya kosmos.
  </p>
  <button onclick="alert('Teruslah menjelajah alam semesta! 🚀')">
    Jelajahi 🚀
  </button>
</div>

<script>
// Membuat bintang random
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 100; i++) {
  let star = document.createElement("span");
  star.style.top = Math.random() * 100 + "%";
  star.style.left = Math.random() * 100 + "%";
  star.style.animationDuration = (Math.random() * 3 + 1) + "s";
  starsContainer.appendChild(star);
}
</script>

</body>
</html>
